<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danmu Fire Desktop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/hud.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/overlay.css') }}">
</head>
<body>
  <div id="danmubody"></div>

  <!-- Overlay Connecting · P2-2 — shown from page-load until first WS open.
       Hidden automatically once WS connects (or after first message arrives). -->
  <div id="overlay-connecting" class="overlay-connecting is-visible" aria-hidden="true">
    <div class="overlay-connecting-pulse" aria-hidden="true">&#9670;</div>
    <div class="overlay-connecting-label">CONNECTING&hellip;</div>
  </div>

  <!-- Overlay Idle · prototype priority-2-pieces.jsx:174 OverlayIdleQR.
       4 states: idle / scanning / paired / failed. HUD framing (4 corner
       brackets) + top bar (version + state chip) + center hero + QR
       + 6-char pairing code + state-specific action row.
       Hidden by default. Invoke via window.OverlayIdle.{show,hide,setState}. -->
  <div id="overlay-idle" aria-hidden="true" data-state="idle">
    <div class="overlay-idle-backdrop" aria-hidden="true"></div>

    <!-- HUD corner brackets -->
    <span class="overlay-idle-corner is-tl" aria-hidden="true"></span>
    <span class="overlay-idle-corner is-tr" aria-hidden="true"></span>
    <span class="overlay-idle-corner is-bl" aria-hidden="true"></span>
    <span class="overlay-idle-corner is-br" aria-hidden="true"></span>

    <!-- Top bar — DANMU FIRE · DESKTOP | version | state chip -->
    <div class="overlay-idle-topbar" aria-hidden="true">
      <span class="overlay-idle-topbar-brand">DANMU FIRE · DESKTOP</span>
      <span class="overlay-idle-topbar-sep">|</span>
      <span class="overlay-idle-topbar-meta">v{{ app_version }} · {{ join_label }}</span>
      <span class="overlay-idle-topbar-state" id="overlayIdleTopbarState">
        <span class="overlay-idle-topbar-dot" aria-hidden="true"></span>
        <span class="overlay-idle-topbar-en">IDLE · WAITING FOR PAIR</span>
      </span>
    </div>

    <div class="overlay-idle-inner">
      <h1 class="overlay-idle-hero">Danmu Fire</h1>
      <p class="overlay-idle-subtitle" id="overlayIdleSubtitle">用手機掃描 QR 或打開 {{ join_label }} — 開始送彈幕</p>

      <div class="overlay-idle-chip" id="overlayIdleChip" data-state="idle">
        <span class="overlay-idle-chip-dot" aria-hidden="true"></span>
        <span class="overlay-idle-chip-spinner" aria-hidden="true"></span>
        <span class="overlay-idle-chip-label">等待配對</span>
      </div>

      <div class="overlay-idle-qr-wrap">
        <!-- Server-rendered scannable QR svg (v4.10/main feature). overlay.js
             leaves this alone unless dataset.rendered is unset.
             2026-07-07 uiux polish B9: made clickable to open a full-screen
             zoom overlay (#overlayQrZoom below) — the 180px card is hard to
             scan from a projector/TV distance. -->
        <div
          class="overlay-idle-qr"
          id="overlayIdleQr"
          data-rendered="1"
          role="button"
          tabindex="0"
          aria-label="放大配對 QR code"
          style="cursor: zoom-in;"
        >
          {{ qr_svg|safe }}
        </div>
        <div class="overlay-idle-qr-overlay" id="overlayIdleQrOverlay" aria-hidden="true">
          <span class="overlay-idle-qr-icon"></span>
        </div>
      </div>

      <div class="overlay-idle-note" id="overlayIdleNote">
        或輸入 6 碼連線碼: <span class="overlay-idle-pair-code" id="overlayIdlePairCode" style="font-family: var(--font-mono, ui-monospace, monospace);">··-··-··</span>
      </div>

      <div class="overlay-idle-actions" id="overlayIdleActions">
        <span class="overlay-idle-hint">⌥⌘C 複製配對碼 · ESC 進入設定</span>
      </div>
    </div>
  </div>

  <!-- 2026-07-07 uiux polish B9: full-screen QR zoom overlay. Click #overlayIdleQr
       (or Enter/Space on it) to open; click here or press ESC to close.
       Styled entirely via inline style="" attributes (not a <style> block) —
       CSP's style-src-elem has no 'unsafe-inline', only style-src-attr does. -->
  <div
    id="overlayQrZoom"
    role="dialog"
    aria-modal="true"
    aria-label="配對 QR code 放大檢視"
    tabindex="-1"
    style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.88); cursor:zoom-out; align-items:center; justify-content:center;"
  >
    <div
      id="overlayQrZoomCard"
      style="background:#fff; padding:24px; border-radius:12px; width:min(70vh, 70vw); max-width:560px; aspect-ratio:1/1; display:flex; align-items:center; justify-content:center;"
    ></div>
  </div>

  <script nonce="{{ csp_nonce }}">
    window.OVERLAY_CONFIG = {
      wsPath: {{ ws_path|tojson }},
      wsToken: {{ (ws_token or '')|tojson }},
      joinUrl: {{ join_url|tojson }},
      idleAfterMs: 30000
    };
  </script>
  <script nonce="{{ csp_nonce }}">
    // 2026-07-07 uiux polish B9: QR zoom modal. Self-contained inline script
    // (overlay.js isn't wired for this yet and lives outside this task's
    // file boundary) — clones the already-rendered QR markup into the
    // zoom card so it works whether the SVG is server-rendered or the
    // overlay.js fake-QR fallback path filled it in later.
    (function () {
      document.addEventListener("DOMContentLoaded", function () {
        var qr = document.getElementById("overlayIdleQr");
        var zoom = document.getElementById("overlayQrZoom");
        var zoomCard = document.getElementById("overlayQrZoomCard");
        if (!qr || !zoom || !zoomCard) return;

        function openZoom() {
          zoomCard.innerHTML = qr.innerHTML;
          zoom.style.display = "flex";
          zoom.focus();
        }
        function closeZoom() {
          zoom.style.display = "none";
          zoomCard.innerHTML = "";
          qr.focus();
        }

        qr.addEventListener("click", openZoom);
        qr.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            openZoom();
          }
        });
        zoom.addEventListener("click", closeZoom);
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && zoom.style.display === "flex") {
            e.stopPropagation();
            closeZoom();
          }
        });
      });
    })();
  </script>
  <script src="{{ url_for('static', filename='js/overlay-poll.js') }}"></script>
  <script src="{{ url_for('static', filename='js/overlay.js') }}"></script>
</body>
</html>
