<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="csrf-token"
      content="{{ session.get('csrf_token', '') }}"
    />
    <title>Danmu Fire — Admin</title>
    <meta name="description" content="Danmu Fire administration panel — manage settings, blacklist, effects, and history." />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/tailwind.css') }}"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=Klee+One:wght@400;600&family=Noto+Sans:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;600;700;800&family=Noto+Serif+TC:wght@400;500;600;700;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/hud.css') }}"
    />
  </head>
  <body class="admin-body min-h-screen overflow-x-hidden">
    <a href="#app-container" class="skip-link">Skip to main content</a>

    <div
      id="app-container"
      class="admin-app-shell animate-fade-in-scale-up"
      tabindex="-1"
    >
      <!-- Skeleton Loading — HUD chrome overlays until admin.js replaces
           innerHTML with the real dashboard. -->
      <div class="glass-effect hud-corners-auto rounded-3xl shadow-2xl p-6 md:p-8 space-y-6 max-w-md mx-auto">
        <div class="flex items-center justify-center gap-2 pb-1">
          <span class="hud-dot"></span>
          <span class="hud-label is-accent">DANMU · ADMIN · BOOT</span>
        </div>
        <div class="skeleton skeleton-title mx-auto"></div>
        <div class="space-y-4">
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-input"></div>
          <div class="skeleton skeleton-btn"></div>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div
      id="toast-container"
      class="fixed top-5 right-5 z-50 flex flex-col gap-2"
      aria-live="polite"
      role="status"
    ></div>

    <!-- Scripts -->

    <!-- Inject Configuration -->
    <script nonce="{{ csp_nonce }}">
      window.DANMU_CONFIG = {
        session: { logged_in: {{ session.get('logged_in') | tojson }} },
        settingRanges: {{ ranges | tojson }},
        appVersion: {{ app_version | tojson }},
        // Web-server flask-sock channel (admin live feed + viewer push). Same
        // origin so the proxy doesn't strip Upgrade. Path is `/ws` on the
        // reverse proxy; Flask routes it to `@sock.route("/")` under the hood.
        wsUrl: (window.location.protocol === "https:" ? "wss:" : "ws:") + "//" + window.location.host + "/ws",
        // Dedicated WebSocket server port (Electron desktop + overlay
        // clients connect here). Surfaced for the system-overview display.
        wsPort: {{ ws_port | tojson }},
      };
    </script>

    <script src="{{ url_for('static', filename='vendor/i18next.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    <script nonce="{{ csp_nonce }}">ServerI18n.init();</script>
