# HTTPS override — self-signed certificate (auto-generated if missing)
# Usage: docker compose -f docker-compose.yml -f docker-compose.https.yml up -d
services:
  server:
    ports:
      - "${WS_PORT:-4001}:4001"

  reverse-proxy:
    # Disable the HTTP-only proxy defined in the base file
    profiles:
      - disabled

  reverse-proxy-https:
    image: nginx:1.27-alpine
    container_name: danmu-reverse-proxy-https
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx-https.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs
    entrypoint:
      - sh
      - -c
      - |
        if [ ! -f /etc/nginx/certs/fullchain.pem ] || [ ! -f /etc/nginx/certs/privkey.pem ]; then
          echo "[danmu] Auto-generating self-signed certificate..."
          apk add --no-cache openssl >/dev/null 2>&1
          SAN="DNS:localhost,IP:127.0.0.1"
          CN="localhost"
          if [ -n "${SERVER_IP:-}" ]; then
            SAN="$SAN,IP:${SERVER_IP}"
            CN="${SERVER_IP}"
            echo "[danmu] Including public IP in SAN: ${SERVER_IP}"
          fi
          if [ -n "${SERVER_DOMAIN:-}" ]; then
            SAN="$SAN,DNS:${SERVER_DOMAIN}"
            CN="${SERVER_DOMAIN}"
            echo "[danmu] Including domain in SAN: ${SERVER_DOMAIN}"
          fi
          printf '[req]\ndistinguished_name=req\n[SAN]\nsubjectAltName=%s\n' "$SAN" > /tmp/san.cnf
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout /etc/nginx/certs/privkey.pem \
            -out /etc/nginx/certs/fullchain.pem \
            -days 365 \
            -subj "/CN=${CN}" \
            -extensions SAN \
            -config /tmp/san.cnf
          if [ $? -ne 0 ]; then
            echo "[danmu] ERROR: Failed to generate certificate. Check openssl output above."
            exit 1
          fi
          echo "[danmu] Certificate generated (valid 365 days)."
          echo "[danmu] To use a real certificate, place fullchain.pem / privkey.pem in nginx/certs/ and restart."
        fi
        exec nginx -g "daemon off;"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
