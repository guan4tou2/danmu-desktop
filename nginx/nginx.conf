events {}

http {
  server_tokens off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  # Slowloris 防護
  client_header_timeout 10s;
  client_body_timeout   10s;
  keepalive_timeout     65s;
  send_timeout          10s;

  # 上傳大小上限（對齊 Flask MAX_CONTENT_LENGTH = 15MB）
  client_max_body_size  15m;

  # 每個 IP 最多 20 個同時連線
  limit_conn_zone $binary_remote_addr zone=danmu_conn:10m;

  # 每個 IP 每秒最多 10 個 HTTP 請求（burst=30 允許短暫暴增，超過回 429）
  limit_req_zone $binary_remote_addr zone=danmu_req:10m rate=10r/s;
  limit_req_status 429;

  resolver 127.0.0.11 valid=30s ipv6=off;

  server {
    listen 4000;
    server_name _;
    limit_conn danmu_conn 20;

    # Static assets are bursty on first paint (admin loads many JS chunks).
    # Do not rate-limit these files at nginx; backend auth/csrf still applies
    # to mutable endpoints.
    location /static/ {
      set $http_host_var "server";
      proxy_pass http://$http_host_var:4000;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 600s;
    }

    # Admin bootstrap currently fetches /get_settings from root path.
    # Exempt this read-only endpoint from public limit_req to avoid 429
    # cascades during initial admin load.
    location = /get_settings {
      set $http_host_var "server";
      proxy_pass http://$http_host_var:4000;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 600s;
    }

    location / {
      limit_req  zone=danmu_req burst=30 nodelay;
      set $http_host_var "server";
      proxy_pass http://$http_host_var:4000;
      proxy_http_version 1.1;
      # Use `$http_host` (not `$host`) to preserve the port the client
      # actually connected to. Required for correct Flask redirects on
      # non-standard ports (e.g. a port-only deployment on 4000) and for
      # Trusted-Hosts validation when TRUSTED_HOSTS includes `:port`.
      # See nginx-https.conf for the longer version of this explanation.
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 600s;
    }
  }

  server {
    listen 4001;
    server_name _;
    limit_conn danmu_conn 20;

    location / {
      set $ws_host_var "server";
      proxy_pass http://$ws_host_var:4001;
      proxy_http_version 1.1;
      # Use `$http_host` (not `$host`) to preserve the port the client
      # actually connected to. Required for correct Flask redirects on
      # non-standard ports (e.g. a port-only deployment on 4000) and for
      # Trusted-Hosts validation when TRUSTED_HOSTS includes `:port`.
      # See nginx-https.conf for the longer version of this explanation.
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 600s;
    }
  }
}
