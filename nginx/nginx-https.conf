events {}

http {
  server_tokens off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  # Slowloris 防護
  client_header_timeout 10s;
  client_body_timeout   10s;
  keepalive_timeout     65s;
  send_timeout          10s;

  # 上傳大小上限（對齊 Flask MAX_CONTENT_LENGTH = 15MB）
  client_max_body_size  15m;

  # 每個 IP 最多 20 個同時連線
  limit_conn_zone $binary_remote_addr zone=danmu_conn:10m;

  # 每個 IP 每秒最多 10 個 HTTP 請求（burst=30 允許短暫暴增，超過回 429）
  limit_req_zone $binary_remote_addr zone=danmu_req:10m rate=10r/s;
  limit_req_status 429;

  upstream danmu_http_backend {
    server server:4000;
  }

  upstream danmu_ws_backend {
    server server:4001;
  }

  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name _;
    limit_conn danmu_conn 20;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # HTTP 限流（WebSocket /ws 路徑不套用，長連線不適用）
    limit_req zone=danmu_req burst=30 nodelay;

    # WebSocket (wss://host/ws) — 覆寫上層 limit_req，不限制
    location /ws {
      limit_req off;
      proxy_pass http://danmu_ws_backend/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 600s;
    }

    # HTTP
    location / {
      proxy_pass http://danmu_http_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 600s;
    }
  }
}
