name: Docker Build

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - "docker-compose.yml"
      - "server/Dockerfile"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches:
      - main
    paths:
      - "server/**"
      - "docker-compose.yml"
      - "server/Dockerfile"
      - ".github/workflows/docker-build.yml"

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LOCAL_IMAGE: danmu-server:test
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build image list
        id: images
        run: |
          IMAGES="ghcr.io/${{ github.repository_owner }}/danmu-server"
          if [ -n "${{ env.DOCKERHUB_USERNAME }}" ] && [ -n "${{ env.DOCKERHUB_TOKEN }}" ]; then
            IMAGES="$IMAGES
          ${{ env.DOCKERHUB_USERNAME }}/danmu-server"
          fi
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$IMAGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.images.outputs.list }}
          tags: |
            type=raw,value=latest
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha
            type=ref,event=tag

      - name: Build test image (linux/amd64)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.LOCAL_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          set -e
          docker run -d --name test-server \
            -e ADMIN_PASSWORD=test \
            -e WS_HOST=0.0.0.0 \
            -p 4000:4000 \
            -p 4001:4001 \
            $LOCAL_IMAGE
          READY=0
          for i in {1..12}; do
            if ! docker ps --filter "name=test-server" --filter "status=running" --format '{{.Names}}' | grep -q '^test-server$'; then
              echo "test-server exited unexpectedly"
              docker logs test-server || true
              docker rm -f test-server || true
              exit 1
            fi
            if curl -fsS http://localhost:4000/health >/dev/null 2>&1; then
              echo "Server is up"
              READY=1
              break
            fi
            echo "Waiting for server... ($i/12)"
            sleep 5
          done
          if [ "$READY" -ne 1 ]; then
            echo "Server did not become ready in time"
            docker logs test-server || true
            docker rm -f test-server || true
            exit 1
          fi

          echo "=== Smoke test: verify core routes ==="
          curl -fsS http://localhost:4000/ > /dev/null
          echo "[PASS] GET / (main page)"
          curl -fsS http://localhost:4000/overlay > /dev/null
          echo "[PASS] GET /overlay (OBS page)"

          echo "=== Smoke test: /fire + WS delivery ==="
          # Use Python inside the container (always available) to:
          # 1. Connect a WS client to port 4001
          # 2. POST /fire with a test danmu
          # 3. Verify the WS client receives the message
          docker exec test-server python3 -c "
          import json, threading, time
          from websockets.sync.client import connect

          received = []
          def ws_listener():
              with connect('ws://127.0.0.1:4001') as ws:
                  while True:
                      msg = ws.recv(timeout=10)
                      if msg == 'connection':
                          continue
                      data = json.loads(msg) if isinstance(msg, str) else msg
                      if isinstance(data, dict) and data.get('type') in ('ping', 'heartbeat_ack'):
                          if data.get('type') == 'ping':
                              ws.send(json.dumps({'type': 'pong'}))
                          continue
                      received.append(data)
                      break

          t = threading.Thread(target=ws_listener, daemon=True)
          t.start()
          time.sleep(1)  # Wait for WS registration

          import urllib.request
          req = urllib.request.Request(
              'http://127.0.0.1:4000/fire',
              data=json.dumps({'text': 'docker_smoke_test'}).encode(),
              headers={'Content-Type': 'application/json'},
          )
          resp = urllib.request.urlopen(req)
          assert resp.status == 200, f'/fire returned {resp.status}'

          t.join(timeout=5)
          assert len(received) == 1, f'Expected 1 message, got {len(received)}'
          assert received[0]['text'] == 'docker_smoke_test', f'Wrong text: {received[0].get(\"text\")}'
          print('[PASS] POST /fire -> WS client received danmu')
          "

          echo "=== All Docker smoke tests passed ==="
          docker rm -f test-server

      - name: Build and push multi-arch image
        if: github.event_name == 'push'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
