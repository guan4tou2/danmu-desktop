name: Docker Build

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - "shared/**"
      - "docker-compose.yml"
      - "server/Dockerfile"
      - ".env.example"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches:
      - main
    paths:
      - "server/**"
      - "shared/**"
      - "docker-compose.yml"
      - "server/Dockerfile"
      - ".env.example"
      - ".github/workflows/docker-build.yml"

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LOCAL_IMAGE: danmu-server:test
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build image list
        id: images
        run: |
          IMAGES="ghcr.io/${{ github.repository_owner }}/danmu-server"
          if [ -n "${{ env.DOCKERHUB_USERNAME }}" ] && [ -n "${{ env.DOCKERHUB_TOKEN }}" ]; then
            IMAGES="$IMAGES
          ${{ env.DOCKERHUB_USERNAME }}/danmu-server"
          fi
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$IMAGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.images.outputs.list }}
          tags: |
            type=raw,value=latest
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha
            type=ref,event=tag

      - name: Build test image (linux/amd64)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./server/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.LOCAL_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          set -e
          docker run -d --name test-server \
            -e ADMIN_PASSWORD=test \
            -e WS_REQUIRE_TOKEN=false \
            -p 8080:8080 \
            $LOCAL_IMAGE
          # WS_REQUIRE_TOKEN=false opts out of v4.8's secure-by-default
          # seeding so the smoke test can connect without obtaining a token
          # via the admin UI first. Real deploys leave this unset and the
          # runtime state file is seeded with a generated token + auth on.
          READY=0
          for i in {1..12}; do
            if ! docker ps --filter "name=test-server" --filter "status=running" --format '{{.Names}}' | grep -q '^test-server$'; then
              echo "test-server exited unexpectedly"
              docker logs test-server || true
              docker rm -f test-server || true
              exit 1
            fi
            if curl -fsS http://localhost:8080/health >/dev/null 2>&1; then
              echo "Server is up"
              READY=1
              break
            fi
            echo "Waiting for server... ($i/12)"
            sleep 5
          done
          if [ "$READY" -ne 1 ]; then
            echo "Server did not become ready in time"
            docker logs test-server || true
            docker rm -f test-server || true
            exit 1
          fi

          WS_READY=0
          for i in {1..12}; do
            if docker exec test-server python3 -c "from websockets.sync.client import connect; ws = connect('ws://127.0.0.1:8080/ws', open_timeout=1); ws.close()" >/dev/null 2>&1; then
              echo "WebSocket route is up"
              WS_READY=1
              break
            fi
            echo "Waiting for WebSocket route... ($i/12)"
            sleep 1
          done
          if [ "$WS_READY" -ne 1 ]; then
            echo "WebSocket route did not become ready in time"
            docker logs test-server || true
            docker rm -f test-server || true
            exit 1
          fi

          echo "=== Smoke test: verify core routes ==="
          curl -fsS http://localhost:8080/ > /dev/null
          echo "[PASS] GET / (main page)"
          curl -fsS http://localhost:8080/overlay > /dev/null
          echo "[PASS] GET /overlay (OBS page)"

          echo "=== Smoke test: /fire + WS delivery ==="
          # Use Python inside the container (always available) to:
          # 1. Connect a WS client to Flask's /ws route
          # 2. POST /fire with a test danmu
          # 3. Verify the WS client receives the message
          docker exec test-server python3 -c "
          import json, time, urllib.request
          from websockets.sync.client import connect

          received = []
          with connect('ws://127.0.0.1:8080/ws') as ws:
              req = urllib.request.Request(
                  'http://127.0.0.1:8080/fire',
                  data=json.dumps({'text': 'docker_smoke_test'}).encode(),
                  headers={'Content-Type': 'application/json'},
              )
              resp = urllib.request.urlopen(req)
              assert resp.status == 200, f'/fire returned {resp.status}'

              deadline = time.monotonic() + 10
              while time.monotonic() < deadline:
                  remaining = max(0.1, deadline - time.monotonic())
                  try:
                      msg = ws.recv(timeout=remaining)
                  except TimeoutError:
                      break
                  if msg == 'connection':
                      continue
                  data = json.loads(msg) if isinstance(msg, str) else msg
                  if isinstance(data, dict) and data.get('type') in ('ping', 'heartbeat_ack'):
                      if data.get('type') == 'ping':
                          ws.send(json.dumps({'type': 'pong'}))
                      continue
                  received.append(data)
                  break

          assert len(received) == 1, f'Expected 1 message, got {len(received)}'
          assert received[0]['text'] == 'docker_smoke_test', f'Wrong text: {received[0].get(\"text\")}'
          print('[PASS] POST /fire -> WS client received danmu')
          "

          echo "=== All Docker smoke tests passed ==="
          docker rm -f test-server

      - name: Build and push multi-arch image
        if: github.event_name == 'push'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
