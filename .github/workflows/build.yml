name: Build Electron App

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - "danmu-desktop/package.json"
  workflow_dispatch:

jobs:
  check_version_change:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Get current version
        id: get_version
        shell: bash
        run: |
          set -e
          VERSION=$(node -p "require('./danmu-desktop/package.json').version")
          echo "version=$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if version changed
        id: check
        shell: bash
        run: |
          git fetch
          PREV_VERSION=$(git show HEAD~1:danmu-desktop/package.json | grep '"version"' | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')
          CURR_VERSION=$(node -p "require('./danmu-desktop/package.json').version")

          if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "Version changed: $PREV_VERSION -> $CURR_VERSION"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged: $CURR_VERSION"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check_version_change
    if: needs.check_version_change.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd danmu-desktop
          npm install

      - name: Build Electron App
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          APP_VERSION: ${{ needs.check_version_change.outputs.version }}
        run: |
          cd danmu-desktop
          npm run build:webpack

          if [ "$RUNNER_OS" == "Linux" ]; then
            npx electron-builder --linux --config.extraMetadata.version=$APP_VERSION
          elif [ "$RUNNER_OS" == "Windows" ]; then
            npx electron-builder --win --config.extraMetadata.version=$APP_VERSION
          elif [ "$RUNNER_OS" == "macOS" ]; then
            npx electron-builder --mac --arm64 --config.extraMetadata.version=$APP_VERSION
          fi

          echo "Listing packaged files in danmu-desktop/pack:"
          ls -R pack

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Electron-App-${{ matrix.os }}
          path: danmu-desktop/pack/**/*

  release:
    needs: [check_version_change, build]
    if: needs.check_version_change.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.check_version_change.outputs.version }}
          name: Release v${{ needs.check_version_change.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## MacOS Installation
            First execute, run in terminal:
            ```bash
            sudo xattr -r -d com.apple.quarantine 'Danmu Desktop.app'
            ```
          files: |
            artifacts/Electron-App-ubuntu-latest/Danmu Desktop*-*.AppImage
            artifacts/Electron-App-ubuntu-latest/Danmu Desktop*-*.deb
            artifacts/Electron-App-ubuntu-latest/latest-linux.yml
            artifacts/Electron-App-windows-latest/Danmu Desktop*-*.exe
            artifacts/Electron-App-windows-latest/latest.yml
            artifacts/Electron-App-macos-latest/Danmu Desktop*-mac-arm64.dmg
            artifacts/Electron-App-macos-latest/Danmu Desktop*-mac-arm64.zip
            artifacts/Electron-App-macos-latest/latest-mac.yml
