name: Tests

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - "danmu-desktop/**"
      - "shared/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - "server/**"
      - "danmu-desktop/**"
      - "shared/**"
      - ".github/workflows/**"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: server/.venv
          key: uv-${{ runner.os }}-py3.11-${{ hashFiles('server/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-py3.11-

      - name: Set up environment
        run: cp .env.example .env

      - name: Install dependencies
        working-directory: server
        run: uv sync --group dev

      - name: Install Playwright browsers
        working-directory: server
        run: uv run playwright install --with-deps chromium

      - name: Run tests with coverage
        working-directory: server
        run: |
          PYTHONPATH=.. uv run python -m pytest -v --cov=. --cov-report=term-missing --cov-report=xml:coverage.xml
          echo "### Test Coverage" >> $GITHUB_STEP_SUMMARY
          uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY || true

      - name: Check code formatting
        working-directory: server
        run: |
          uv run black --check .
          uv run isort --check-only .

      - name: Lint with flake8
        working-directory: server
        run: uv run flake8 .

  js-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            danmu-desktop/package-lock.json
            server/package-lock.json

      - name: Install dependencies
        run: |
          cd danmu-desktop && npm install
          cd ../server && npm install

      - name: Verify client i18n.js is up-to-date
        working-directory: danmu-desktop
        run: |
          node scripts/build-i18n.js
          git diff --exit-code i18n.js || { echo "❌ i18n.js is stale — run 'npm run build:i18n' in danmu-desktop/ and commit"; exit 1; }

      - name: Verify server i18n.js is up-to-date
        working-directory: server
        run: |
          node scripts/build-i18n.js
          git diff --exit-code static/js/i18n.js || { echo "❌ server i18n.js is stale — run 'npm run build:i18n' in server/ and commit"; exit 1; }

      - name: Verify tokens.css symlink
        run: |
          if [ ! -L server/static/css/tokens.css ]; then
            echo "❌ server/static/css/tokens.css is not a symlink — run 'make copy-tokens' and commit"
            exit 1
          fi
          TARGET=$(readlink server/static/css/tokens.css)
          if [ "$TARGET" != "../../../shared/tokens.css" ]; then
            echo "❌ symlink points to '$TARGET', expected '../../../shared/tokens.css' — run 'make copy-tokens' and commit"
            exit 1
          fi
          if [ ! -f server/static/css/tokens.css ]; then
            echo "❌ symlink target does not exist — shared/tokens.css missing"
            exit 1
          fi
          echo "✓ tokens.css symlink OK → $TARGET"

      - name: Verify tailwind.css is up-to-date
        working-directory: server
        run: |
          npm run build:css
          git diff --exit-code static/css/tailwind.css || { echo "❌ tailwind.css is stale — run 'npm run build:css' in server/ and commit"; exit 1; }

      - name: Run Jest tests
        working-directory: danmu-desktop
        run: npx jest --testPathPatterns=tests/

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: danmu-desktop/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: server/.venv
          key: uv-${{ runner.os }}-py3.11-${{ hashFiles('server/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-py3.11-

      - name: Set up environment
        run: cp .env.example .env

      - name: Install Python dependencies
        working-directory: server
        run: uv sync

      - name: Install Node dependencies and build
        working-directory: danmu-desktop
        run: |
          npm install
          npm run build:webpack

      - name: Run Playwright e2e tests
        working-directory: danmu-desktop
        env:
          ELECTRON_DISABLE_SANDBOX: 1
        run: xvfb-run --auto-servernum npx playwright test

      - name: Verify electron-builder packaging
        working-directory: danmu-desktop
        run: |
          npx electron-builder --dir --linux
          # Verify the unpacked app directory was created
          if [ ! -d pack/linux-unpacked ]; then
            echo "❌ electron-builder --dir did not produce pack/linux-unpacked"
            exit 1
          fi
          # Verify critical files are present in the packaged app
          RESOURCES=pack/linux-unpacked/resources
          if [ ! -f "$RESOURCES/app.asar" ]; then
            echo "❌ app.asar missing from packaged output"
            exit 1
          fi
          echo "✓ electron-builder packaging verified ($(du -sh pack/linux-unpacked | cut -f1))"

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv and pip-audit
        run: pip install uv pip-audit

      - name: Install dependencies
        working-directory: server
        run: uv sync

      - name: Run pip-audit
        working-directory: server
        # CVE-2026-3219 affects `pip` itself with no fix version available
        # (https://github.com/pypa/pip/security/advisories). Build environment
        # only — never reaches runtime — ignore until upstream ships a patch.
        # PYSEC-2024-271 currently flags latest `flask-cors` 6.0.2 with no fix
        # version. Keep the package pinned to the latest release and ignore
        # this advisory until upstream or the advisory database publishes a fix.
        run: |
          uv export --frozen --no-dev --no-hashes --no-emit-project --output-file requirements-audit.txt
          pip-audit -r requirements-audit.txt --ignore-vuln CVE-2026-3219 --ignore-vuln PYSEC-2024-271

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files
