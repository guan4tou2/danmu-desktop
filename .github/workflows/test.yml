name: Tests

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - "danmu-desktop/**"
  pull_request:
    branches:
      - main
    paths:
      - "server/**"
      - "danmu-desktop/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: server/.venv
          key: uv-${{ runner.os }}-py3.11-${{ hashFiles('server/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-py3.11-

      - name: Set up environment
        run: cp .env.example .env

      - name: Install dependencies
        working-directory: server
        run: uv sync --group dev

      - name: Install Playwright browsers
        working-directory: server
        run: uv run playwright install --with-deps chromium

      - name: Run tests with coverage
        working-directory: server
        run: |
          PYTHONPATH=.. uv run python -m pytest -v --cov=. --cov-report=term-missing --cov-report=xml:coverage.xml
          echo "### Test Coverage" >> $GITHUB_STEP_SUMMARY
          uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY || true

      - name: Check code formatting
        working-directory: server
        run: |
          uv run black --check .
          uv run isort --check-only .

      - name: Lint with flake8
        working-directory: server
        run: uv run flake8 .

  js-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: danmu-desktop/package-lock.json

      - name: Install and test
        working-directory: danmu-desktop
        run: |
          npm install
          npx jest --testPathPatterns=tests/

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: danmu-desktop/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: server/.venv
          key: uv-${{ runner.os }}-py3.11-${{ hashFiles('server/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-py3.11-

      - name: Set up environment
        run: cp .env.example .env

      - name: Install Python dependencies
        working-directory: server
        run: uv sync

      - name: Install Node dependencies and build
        working-directory: danmu-desktop
        run: |
          npm install
          npm run build:webpack

      - name: Run Playwright e2e tests
        working-directory: danmu-desktop
        env:
          ELECTRON_DISABLE_SANDBOX: 1
        run: xvfb-run --auto-servernum npx playwright test

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv and pip-audit
        run: pip install uv pip-audit

      - name: Install dependencies
        working-directory: server
        run: uv sync

      - name: Run pip-audit
        working-directory: server
        run: uv run pip-audit

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files
