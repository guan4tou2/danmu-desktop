services:
  server:
    image: ${DANMU_IMAGE:-danmu-server:local}
    build:
      # Context is the repo root so the `shared/` directory (target of the
      # server/static/css/tokens.css symlink) is inside the build context.
      # A `./server` context silently drops the symlink target, breaking
      # all CSS custom properties at runtime.
      context: .
      dockerfile: server/Dockerfile
    container_name: danmu-fire
    expose:
      - "4000"
      - "4001"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_PASSWORD_HASHED=${ADMIN_PASSWORD_HASHED:-}
      - SECRET_KEY=${SECRET_KEY:-}
      - PORT=${PORT:-4000}
      - WS_PORT=${WS_PORT:-4001}
      - WS_HOST=0.0.0.0
      - ENV=${ENV:-production}
      - FIRE_RATE_LIMIT=${FIRE_RATE_LIMIT:-20}
      - FIRE_RATE_WINDOW=${FIRE_RATE_WINDOW:-60}
      # Set RATE_LIMIT_BACKEND=redis and REDIS_URL in .env when using --profile redis
      - RATE_LIMIT_BACKEND=${RATE_LIMIT_BACKEND:-memory}
      - REDIS_URL=${REDIS_URL:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FONT_TOKEN_EXPIRATION=${FONT_TOKEN_EXPIRATION:-900}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-}
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-localhost,127.0.0.1}
      # Default remains false: any client that can reach port 4001 can connect unless
      # you enable WS_REQUIRE_TOKEN=true or restrict access at the proxy/firewall layer.
      - WS_REQUIRE_TOKEN=${WS_REQUIRE_TOKEN:-false}
      - WS_AUTH_TOKEN=${WS_AUTH_TOKEN:-}
      - WS_ALLOWED_ORIGINS=${WS_ALLOWED_ORIGINS:-}
      - WEB_WS_ALLOWED_ORIGINS=${WEB_WS_ALLOWED_ORIGINS:-}
      - WS_MAX_CONNECTIONS=${WS_MAX_CONNECTIONS:-200}
      - WS_MAX_CONNECTIONS_PER_IP=${WS_MAX_CONNECTIONS_PER_IP:-10}
      - TRUST_X_FORWARDED_FOR=true
      # Redirect filter rules + settings + webhooks into the persisted runtime
      # volume. Overridable via .env. See DEPLOYMENT.md § Data persistence.
      - FILTER_RULES_FILE=${FILTER_RULES_FILE:-/app/server/runtime/filter_rules.json}
      - SETTINGS_FILE=${SETTINGS_FILE:-/app/server/runtime/settings.json}
      - WEBHOOKS_PATH=${WEBHOOKS_PATH:-/app/server/runtime/webhooks.json}
    volumes:
      - ./server/user_fonts:/app/server/user_fonts
      - ./server/static:/app/server/static
      - ./server/logs:/app/server/logs
      # Persisted runtime state — survives container recreate (upgrade-safe).
      # Contains filter_rules.json, settings.json, webhooks.json (via env vars
      # above) and plugins_state.json (via PluginManager's _STATE_FILE).
      - ./server/runtime:/app/server/runtime
      # Custom user plugins. Bundled example plugins stay inside the image at
      # /app/server/plugins (not mounted) so upstream fixes arrive on upgrade.
      - ./server/user_plugins:/app/server/user_plugins
    restart: unless-stopped
    # Security hardening (v4.8.6+):
    # - `no-new-privileges` blocks setuid/setgid escalation inside the
    #   container (defence-in-depth: the image already runs as UID 1000
    #   non-root, this seals the escape hatch).
    # - Drop ALL capabilities: Python Flask + websockets on high ports
    #   (4000/4001) needs zero Linux caps. `NET_BIND_SERVICE` only required
    #   for <1024 binds; nginx sidecar handles 80/443, server itself never
    #   touches privileged ports.
    # - `pids_limit` caps fork/thread explosion (a Python runaway or
    #   plugin bug can't fork-bomb the host).
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: ${SERVER_MEMORY_LIMIT:-512m}
          cpus: "${SERVER_CPU_LIMIT:-1.0}"
          pids: 200
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.danmu-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.danmu-https-redirect.redirectscheme.permanent=true
      - traefik.http.routers.danmu-http.rule=Host(`${DOMAIN:-localhost}`)
      - traefik.http.routers.danmu-http.entrypoints=web
      - traefik.http.routers.danmu-http.middlewares=danmu-https-redirect
      - traefik.http.routers.danmu.rule=Host(`${DOMAIN:-localhost}`) && !PathPrefix(`/ws`)
      - traefik.http.routers.danmu.entrypoints=websecure
      - traefik.http.routers.danmu.tls.certresolver=le
      - traefik.http.services.danmu.loadbalancer.server.port=4000
      - traefik.http.middlewares.danmu-ws-strip.stripprefix.prefixes=/ws
      - traefik.http.routers.danmu-ws.rule=Host(`${DOMAIN:-localhost}`) && PathPrefix(`/ws`)
      - traefik.http.routers.danmu-ws.entrypoints=websecure
      - traefik.http.routers.danmu-ws.tls.certresolver=le
      - traefik.http.routers.danmu-ws.middlewares=danmu-ws-strip
      - traefik.http.services.danmu-ws.loadbalancer.server.port=4001
    depends_on:
      redis:
        condition: service_healthy
        required: false

  # ── HTTP mode (--profile http) ────────────────────────────────────────────
  reverse-proxy:
    profiles: [http]
    image: nginx:1.27-alpine
    container_name: danmu-reverse-proxy
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${PORT:-4000}:4000"
      - "${WS_PORT:-4001}:4001"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Keep default caps so nginx can bind to <1024 ports when PORT is overridden.
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
          pids: 100

  # ── HTTPS self-signed mode (--profile https) ─────────────────────────────
  reverse-proxy-https:
    profiles: [https]
    image: nginx:1.27-alpine
    container_name: danmu-reverse-proxy-https
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${WS_PORT:-4001}:4001"
    volumes:
      - ./nginx/nginx-https.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs
    environment:
      - SERVER_IP=${SERVER_IP:-}
      - SERVER_DOMAIN=${SERVER_DOMAIN:-}
    entrypoint:
      - sh
      - -c
      - |
        if [ ! -f /etc/nginx/certs/fullchain.pem ] || [ ! -f /etc/nginx/certs/privkey.pem ]; then
          echo "[danmu] Auto-generating self-signed certificate..."
          apk add --no-cache openssl >/dev/null 2>&1
          _SAN="DNS:localhost,IP:127.0.0.1"
          _CN="localhost"
          if [ -n "$$SERVER_IP" ]; then
            _SAN="$$_SAN,IP:$$SERVER_IP"
            _CN="$$SERVER_IP"
            echo "[danmu] Including public IP in SAN: $$SERVER_IP"
          fi
          if [ -n "$$SERVER_DOMAIN" ]; then
            _SAN="$$_SAN,DNS:$$SERVER_DOMAIN"
            _CN="$$SERVER_DOMAIN"
            echo "[danmu] Including domain in SAN: $$SERVER_DOMAIN"
          fi
          printf '[req]\ndistinguished_name=req\n[SAN]\nsubjectAltName=%s\n' "$$_SAN" > /tmp/san.cnf
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout /etc/nginx/certs/privkey.pem \
            -out /etc/nginx/certs/fullchain.pem \
            -days 365 \
            -subj "/CN=$$_CN" \
            -extensions SAN \
            -config /tmp/san.cnf || { echo "[danmu] ERROR: Failed to generate certificate. Exiting."; exit 1; }
          echo "[danmu] Certificate generated (valid 365 days)."
        fi
        exec nginx -g "daemon off;"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Default caps retained: nginx binds 80/443 + entrypoint runs
    # `apk add openssl` to generate the self-signed cert; dropping caps
    # would break both.
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
          pids: 100

  # ── Traefik + Let's Encrypt mode (--profile traefik) ─────────────────────
  traefik:
    profiles: [traefik]
    image: traefik:v3.3
    container_name: danmu-traefik
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Create before first run: touch traefik/acme.json && chmod 600 traefik/acme.json
      - ./traefik/acme.json:/acme.json
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:-admin@example.com}
      - --certificatesresolvers.le.acme.storage=/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
          pids: 100

  # ── Redis rate limiting add-on (--profile redis) ─────────────────────────
  redis:
    profiles: [redis]
    image: redis:7-alpine
    container_name: danmu-redis
    # Run directly as the redis user (UID 999 in the upstream image). The
    # redis:7-alpine entrypoint normally starts as root and uses `gosu` to
    # drop privileges via `setresuid` — but that setuid syscall is blocked
    # by `no-new-privileges:true` + `cap_drop: ALL` (CAP_SETUID missing),
    # making the container fail to boot. Starting as non-root from the
    # outset skips the gosu path entirely and keeps our security posture.
    user: "999:999"
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 100
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  redis-data:
