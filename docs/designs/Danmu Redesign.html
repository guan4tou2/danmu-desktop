    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Zen Kaku Gothic New', 'Noto Sans TC', -apple-system, system-ui, sans-serif;
      background: oklch(0.12 0.02 250);
      color: oklch(0.96 0.01 240);

    @keyframes hud-pulse { 0%,100% { opacity:1; transform:scale(1);} 50% { opacity:.6; transform:scale(.9);} }
    @keyframes dm-scroll { from { transform: translateX(0);} to { transform: translateX(2400px);} }
    .tweaks-panel {
      position: fixed; right: 16px; bottom: 16px;
      background: oklch(0.16 0.022 250);
      border: 1px solid oklch(0.82 0.14 195 / 0.45);
      padding: 14px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; color: oklch(0.96 0.01 240);
      letter-spacing: 1px; z-index: 1000; min-width: 220px; display: none;
      clip-path: polygon(0 10px, 10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);

    .tweaks-panel.open { display: block; }
    .tweaks-panel h4 { margin: 0 0 10px; font-size: 10px; letter-spacing: 2px; color: oklch(0.82 0.14 195); font-weight: 600; }
    .tweaks-panel .row { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
    .tweaks-panel button {
      background: transparent; border: 1px solid oklch(0.32 0.03 220 / 0.55);
      color: oklch(0.72 0.015 240); padding: 4px 8px;
      font-family: inherit; font-size: 10px; letter-spacing: 1px; cursor: pointer;

    .tweaks-panel .label { font-size: 9px; letter-spacing: 2px; color: oklch(0.55 0.015 240); margin-bottom: 4px; text-transform: uppercase; }

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "pollEnabled": "false"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('open');
      else if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('open');
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    const panel = document.getElementById('tweaks');
    panel.querySelectorAll('.row').forEach(row => {
      const group = row.dataset.group;
      row.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          row.querySelectorAll('button').forEach(b => b.classList.remove('on'));
          btn.classList.add('on');
          const val = btn.dataset.val;
          setTweaks(t => ({ ...t, [group]: val }));
          window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [group]: val } }, '*');
        });
        if (btn.dataset.val === TWEAK_DEFAULTS[group]) btn.classList.add('on');
      });
    });
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const pollOn = tweaks.pollEnabled === 'true' || tweaks.pollEnabled === true;

  const Intro = () => (
    <div data-screen-label="00 README" style={{
      width: 900, padding: '40px 44px',
      background: 'oklch(0.14 0.02 250)',
      border: '1px solid oklch(0.82 0.14 195 / 0.45)',
      color: 'oklch(0.96 0.01 240)',
      fontFamily: hudTokens.fontSans, position: 'relative',
      clipPath: 'polygon(0 18px, 18px 0, 100% 0, 100% calc(100% - 18px), calc(100% - 18px) 100%, 0 100%)',
    }}>
      <HudLabel color={hudTokens.cyan}>DANMU-DESKTOP · UI/UX REDESIGN · v3</HudLabel>
      <div style={{ fontFamily: hudTokens.fontDisplay, fontSize: 42, fontWeight: 700, letterSpacing: -1, marginTop: 10, lineHeight: 1.1 }}>
        全景重新設計 <span style={{ color: hudTokens.cyan }}>/</span> 對齊原版功能
      </div>
      <div style={{ color: hudTokens.textDim, fontSize: 13, marginTop: 14, lineHeight: 1.7 }}>
        依原 README 特性逐項對齊：<b style={{ color: hudTokens.text }}>5 種 layout · 8 效果 + .dme · 暱稱 / 顏色 / 描邊 / 陰影 · 效果可疊加 · 4 主題 · 2–6 選項投票（A/B/C/D 輸入） · OBS 小工具 · Plugin SDK</b>。
        此版額外：字型選擇、透明度、字級 — 為觀眾端的合理延伸。
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 18, marginTop: 28, paddingTop: 22, borderTop: `1px solid ${hudTokens.line}` }}>
        {[
          { t: 'Danmu Fire · 觀眾端', d: '暱稱 / 文字 / 顏色 / 字型 / 字級 / 透明度 / 描邊 / 陰影 / 效果疊加 / Layout / 主題。只送不收。Poll 條件顯示；投票無 %。' },
          { t: 'Admin · 控制台', d: '移除 DISPLAY 設定卡（那在 /effects、/fonts 頁面）。主畫面聚焦：KPI / 投票建立 & 進行中 / 訊息審核 / Widgets & Plugins。Sidebar：session + telemetry。' },
          { t: 'Desktop Client · Electron', d: '3 個關鍵畫面：透明 overlay 實景 / 控制視窗（連線、快捷鍵、更新整合於此） / macOS tray menu。自動更新。' },
        ].map(x => (
          <div key={x.t}>
            <HudLabel color={hudTokens.cyan}>◉ {x.t}</HudLabel>
            <div style={{ fontSize: 12, color: hudTokens.textDim, marginTop: 6, lineHeight: 1.6 }}>{x.d}</div>
          </div>
        ))}
      </div>
      <div style={{ marginTop: 18, padding: 12, background: hudTokens.cyanSoft, border: `1px solid ${hudTokens.cyanLine}`, fontSize: 12, color: hudTokens.text, lineHeight: 1.6 }}>
        <HudLabel color={hudTokens.cyan}>TRY</HudLabel>
        <div style={{ marginTop: 4 }}>右下 Tweaks 切換 Poll — 觀眾端 Poll tab 會即時出現或隱藏。</div>
      </div>
      <div style={{ marginTop: 10, padding: 10, background: 'rgba(252,211,77,0.08)', border: '1px solid rgba(252,211,77,0.35)', fontSize: 11, color: hudTokens.text, lineHeight: 1.55 }}>
        <HudLabel color={hudTokens.amber}>v5.0 DESIGN REPLY · 2026-04-26</HudLabel>
        <div style={{ marginTop: 4, fontFamily: hudTokens.fontMono, fontSize: 10, color: hudTokens.textDim, letterSpacing: 0.3 }}>
          <b style={{ color: hudTokens.text }}>已對齊 handoff:</b> Display Settings 移除右 rail DeployCard,preview 移到中欄頂部 + 隱式 deploy(自動同步)。Polls dropzone + crop 切換器已在 prototype。Sidebar 11 nav,廣播只留 topbar 燈號。Mobile 假狀態列僅 prototype mockup,viewer 不需畫。
        </div>
      </div>
    </div>
  );

  return (
    <DesignCanvas minScale={0.05} maxScale={3}>
      <div style={{ padding: '0 60px' }}><Intro /></div>
      <div style={{ height: 60 }} />

      <DCSection title="IA Spec · §H IA / 語義同步" subtitle="2026-04-28 handoff §H — 5 條 IA 規則的 single source of truth · 視覺 polish 之前先收斂語義">
        <DCArtboard width={1440} height={920} label="§H · 路由可見性矩陣 · Route × Mode (rule #1 #4 #5)" style={{ background: 'transparent' }}>
          <div data-screen-label="IA · Route Matrix" style={{ width: 1440, height: 920 }}><IASpecRouteMatrix /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="§H · 狀態語義 · Session / Broadcast (rule #2 #3)" style={{ background: 'transparent' }}>
          <div data-screen-label="IA · State Diagrams" style={{ width: 1440, height: 920 }}><IASpecStateDiagram /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="§H · Live 模式操作流 · 3 happy paths (rule #5)" style={{ background: 'transparent' }}>
          <div data-screen-label="IA · Live Operator Path" style={{ width: 1440, height: 920 }}><IASpecLiveOperatorPath /></div>
        </DCArtboard>
      </DCSection>

      <DCSection title="Decisions Log · 2026-04-28 sprint" subtitle="4 條 PM-confirmed 結論 · B.3 / B.1 / DS-007 / DS-008 — 取代 chat 為 source of truth">
        <DCArtboard width={1440} height={920} label="Decisions · 4 條 sprint lock-in" style={{ background: 'transparent' }}>
          <div data-screen-label="Decisions · 2026-04-28" style={{ width: 1440, height: 920 }}><DecisionsLog2026Apr28 /></div>
        </DCArtboard>
      </DCSection>

      <DCSection title="DS-004 · Viewer Effects · 參數面板" subtitle="per-effect runtime tuning panel · dark / light × 彈跳 / 閃爍 兩示例">
        <DCArtboard width={1440} height={920} label="DS-004 · Bounce · Dark" style={{ background: 'transparent' }}>
          <div data-screen-label="DS-004 · Bounce · Dark" style={{ width: 1440, height: 920 }}><ViewerEffectsParamPanel theme="dark" effect="bounce-cartoon" /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="DS-004 · Blink · Light" style={{ background: 'transparent' }}>
          <div data-screen-label="DS-004 · Blink · Light" style={{ width: 1440, height: 920 }}><ViewerEffectsParamPanel theme="light" effect="blink-crt" /></div>
        </DCArtboard>
      </DCSection>

      <DCSection title="Danmu Fire · 觀眾端" subtitle="完整欄位對齊原版 user-facing 頁面，統一以「網站」呈現 — 手機 Safari / 桌面 Chrome，不是 App">
        <DCArtboard width={375} height={812} label="Mobile · Safari · 138.2.59.206:4000" style={{ background: '#000', borderRadius: 36, overflow: 'hidden', boxShadow: '0 10px 40px rgba(0,0,0,0.3)' }}>
          <div data-screen-label="Viewer Mobile Web" style={{ width: 375, height: 812 }}>
            <MobileSafariChrome url="138.2.59.206:4000" dark={tweaks.theme === 'dark'}>
              <ViewerMobile theme={tweaks.theme} pollEnabled={pollOn} inBrowser />
            </MobileSafariChrome>
          </div>
        </DCArtboard>
        <DCArtboard width={900} height={760} label="Desktop · Chrome · 138.2.59.206:4000" style={{ background: 'transparent' }}>
          <div data-screen-label="Viewer Desktop Web" style={{ width: 900, height: 760 }}>
            <ChromeWindow
              width={900} height={760}
              tabs={[{ title: 'Danmu · Live' }, { title: 'Keynote' }, { title: '筆記' }]}
              activeIndex={0}
              url="https://138.2.59.206:4000/"
            >
              <div style={{ width: '100%', height: '100%' }}>
                <ViewerDesktop theme={tweaks.theme} pollEnabled={pollOn} />
              </div>
            </ChromeWindow>
          </div>
        </DCArtboard>
        <DCPostIt top={-30} left={1320} rotate={2} width={240}>
          試試右下 Tweaks 切換 POLL — 觀眾端 Poll tab 會出現或隱藏
        </DCPostIt>
      </DCSection>

      <DCSection title="Admin · 管理後台" subtitle="Dashboard + 子頁面：風格主題包 / 效果庫 / 插件 / 字型 / 系統">
        <DCArtboard width={1100} height={760} label="⓪ 登入 · Admin Login" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · Login" style={{ width: 1100, height: 760 }}><AdminLogin theme={tweaks.theme} /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="① Dashboard · 控制台" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · Dashboard" style={{ width: 1440, height: 920 }}><AdminV3SoftHolo theme={tweaks.theme} /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="② 風格主題包 · Theme Packs" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · Theme Packs" style={{ width: 1440, height: 920 }}><AdminThemePacksPage theme={tweaks.theme} /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="③ 顯示設定 · Display Settings" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · Display Settings" style={{ width: 1440, height: 920 }}><AdminDisplaySettingsPage theme={tweaks.theme} /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={1100} label="③-B 觀眾頁主題 · Viewer Theme" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · Viewer Theme" style={{ width: 1440, height: 1100 }}><AdminViewerThemePage theme={tweaks.theme} /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="④ 效果庫 .dme · Effects" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · Effects" style={{ width: 1440, height: 920 }}><AdminEffectsPage theme={tweaks.theme} /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="⑤ 伺服器插件 · Plugins" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · Plugins" style={{ width: 1440, height: 920 }}><AdminPluginsPage theme={tweaks.theme} /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="⑥ 字型管理 · Fonts" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · Fonts" style={{ width: 1440, height: 920 }}><AdminFontsPage theme={tweaks.theme} /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={1020} label="⑥-B 素材庫 · Assets Library · 統一上傳入口" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · Assets Library" style={{ width: 1440, height: 1020 }}><AdminAssetsPage theme={tweaks.theme} /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="⑦ 系統 & 指紋 · System" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · System" style={{ width: 1440, height: 920 }}><AdminSystemPage theme={tweaks.theme} /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="⑧ 敏感字 & 黑名單 · Moderation" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · Moderation" style={{ width: 1440, height: 920 }}><AdminModerationPage theme={tweaks.theme} /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={1160} label="⑨ 速率限制 · Rate Limits" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · Rate Limits" style={{ width: 1440, height: 1160 }}><AdminRateLimitsPage theme={tweaks.theme} /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="⑩ 訊息紀錄 · Messages" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · Messages" style={{ width: 1440, height: 920 }}><AdminMessagesPage theme={tweaks.theme} /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="⑪ 時間軸匯出 · History Export" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · History" style={{ width: 1440, height: 920 }}><AdminHistoryPage theme={tweaks.theme} /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="⑫ Overlay Widgets · 螢幕外掛元件" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · Widgets" style={{ width: 1440, height: 920 }}><AdminWidgetsPage theme={tweaks.theme} /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="⑬ 操作日誌 · Audit Log" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · Audit Log" style={{ width: 1440, height: 920 }}><AdminAuditLogPage theme={tweaks.theme} /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="DS-001 · History Tabbed · EXPORT" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · History Tabbed · Export" style={{ width: 1440, height: 920 }}><AdminHistoryTabbedPage theme={tweaks.theme} initialTab="export" /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="DS-001 · History Tabbed · LIST" style={{ background: 'transparent' }}>

        </DCArtboard>
        <DCArtboard width={1440} height={920} label="DS-001 · History Tabbed · REPLAY" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · History Tabbed · Replay" style={{ width: 1440, height: 920 }}><AdminHistoryTabbedPage theme={tweaks.theme} initialTab="replay" /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="DS-002 · Viewer Config · PAGE" style={{ background: 'transparent' }}>
          <div data-screen-label="Admin · Viewer Config · Page" style={{ width: 1440, height: 920 }}><AdminViewerConfigTabbedPage theme={tweaks.theme} initialTab="page" /></div>
        </DCArtboard>
        <DCArtboard width={1440} height={920} label="DS-002 · Viewer Config · FIELDS" style={{ background: 'transparent' }}>

      <DCSection title="整合 · Integrations" subtitle="Extensions / Fire Token / Webhooks / API Tokens / Backup · 對外串接 + 維運">

        <DCArtboard width={1440} height={1100} label="⑭-B Fire Token · 用量 + IP log + audit (Sprint 2)" style={{ background: 'transparent' }}>

        </DCArtboard>
        <DCArtboard width={1440} height={920} label="⑮ Webhooks · 對外事件推送" style={{ background: 'transparent' }}>
